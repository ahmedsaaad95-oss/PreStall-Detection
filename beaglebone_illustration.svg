<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
<defs>
<linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#061a2b"/></linearGradient>
<linearGradient id="pcb" x1="0" x2="1"><stop offset="0" stop-color="#0f8f6a"/><stop offset="1" stop-color="#0dbb8f"/></linearGradient>
<linearGradient id="chip" x1="0" x2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#1f2937"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1200" height="700" fill="url(#bg)"/>
<g transform="translate(70,55)">
  <rect x="0" y="0" width="1060" height="590" rx="26" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)"/>
  <text x="36" y="56" fill="#e9edf7" font-size="34" font-family="Arial, sans-serif" font-weight="700">BeagleBone Black (Edge AI Receiver)</text>
  <text x="36" y="92" fill="#aeb7d6" font-size="22" font-family="Arial, sans-serif">Illustrative board view for project architecture section</text>

  <g transform="translate(110,150) rotate(-8 410 200)">
    <rect x="0" y="0" width="820" height="380" rx="20" fill="url(#pcb)" stroke="#83ffd5" stroke-opacity=".35"/>
    <rect x="26" y="26" width="768" height="328" rx="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-dasharray="5 8"/>
    <!-- headers -->
    <g fill="#0b1020" stroke="#d1fae5" stroke-opacity=".45">
      <rect x="20" y="35" width="48" height="300" rx="8"/><rect x="752" y="35" width="48" height="300" rx="8"/>
    </g>
    <!-- pin holes -->
    <g fill="#c7fff0">
      <!-- left pins -->
      <circle cx="32" cy="52" r="3.2"/><circle cx="56" cy="52" r="3.2"/><circle cx="32" cy="70" r="3.2"/><circle cx="56" cy="70" r="3.2"/><circle cx="32" cy="88" r="3.2"/><circle cx="56" cy="88" r="3.2"/><circle cx="32" cy="106" r="3.2"/><circle cx="56" cy="106" r="3.2"/><circle cx="32" cy="124" r="3.2"/><circle cx="56" cy="124" r="3.2"/><circle cx="32" cy="142" r="3.2"/><circle cx="56" cy="142" r="3.2"/><circle cx="32" cy="160" r="3.2"/><circle cx="56" cy="160" r="3.2"/><circle cx="32" cy="178" r="3.2"/><circle cx="56" cy="178" r="3.2"/><circle cx="32" cy="196" r="3.2"/><circle cx="56" cy="196" r="3.2"/><circle cx="32" cy="214" r="3.2"/><circle cx="56" cy="214" r="3.2"/><circle cx="32" cy="232" r="3.2"/><circle cx="56" cy="232" r="3.2"/><circle cx="32" cy="250" r="3.2"/><circle cx="56" cy="250" r="3.2"/><circle cx="32" cy="268" r="3.2"/><circle cx="56" cy="268" r="3.2"/><circle cx="32" cy="286" r="3.2"/><circle cx="56" cy="286" r="3.2"/><circle cx="32" cy="304" r="3.2"/><circle cx="56" cy="304" r="3.2"/>
    </g>
    <g fill="#c7fff0">
      <circle cx="764" cy="52" r="3.2"/><circle cx="788" cy="52" r="3.2"/><circle cx="764" cy="70" r="3.2"/><circle cx="788" cy="70" r="3.2"/><circle cx="764" cy="88" r="3.2"/><circle cx="788" cy="88" r="3.2"/><circle cx="764" cy="106" r="3.2"/><circle cx="788" cy="106" r="3.2"/><circle cx="764" cy="124" r="3.2"/><circle cx="788" cy="124" r="3.2"/><circle cx="764" cy="142" r="3.2"/><circle cx="788" cy="142" r="3.2"/><circle cx="764" cy="160" r="3.2"/><circle cx="788" cy="160" r="3.2"/><circle cx="764" cy="178" r="3.2"/><circle cx="788" cy="178" r="3.2"/><circle cx="764" cy="196" r="3.2"/><circle cx="788" cy="196" r="3.2"/><circle cx="764" cy="214" r="3.2"/><circle cx="788" cy="214" r="3.2"/><circle cx="764" cy="232" r="3.2"/><circle cx="788" cy="232" r="3.2"/><circle cx="764" cy="250" r="3.2"/><circle cx="788" cy="250" r="3.2"/><circle cx="764" cy="268" r="3.2"/><circle cx="788" cy="268" r="3.2"/><circle cx="764" cy="286" r="3.2"/><circle cx="788" cy="286" r="3.2"/><circle cx="764" cy="304" r="3.2"/><circle cx="788" cy="304" r="3.2"/>
    </g>
    <!-- main SoC and RAM -->
    <rect x="320" y="135" width="170" height="130" rx="14" fill="url(#chip)" stroke="rgba(255,255,255,0.18)"/>
    <text x="405" y="205" text-anchor="middle" fill="#e9edf7" font-size="20" font-family="Arial" font-weight="700">AM335x</text>
    <rect x="515" y="150" width="110" height="95" rx="12" fill="#111827" stroke="rgba(255,255,255,0.18)"/>
    <text x="570" y="205" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Arial">DDR</text>
    <!-- ethernet/usb/hdmi -->
    <rect x="135" y="52" width="118" height="62" rx="10" fill="#94a3b8" opacity=".85"/>
    <rect x="270" y="52" width="96" height="50" rx="10" fill="#9ca3af"/>
    <rect x="380" y="52" width="72" height="42" rx="8" fill="#6b7280"/>
    <rect x="640" y="287" width="116" height="48" rx="10" fill="#9ca3af"/>
    <!-- analog/power labels -->
    <g font-family="Arial" font-size="15" fill="#ecfeff">
      <text x="35" y="28">P8/P9 GPIO Headers</text>
      <text x="640" y="278">USB / UART / Power</text>
      <text x="318" y="124">Processor</text>
    </g>
    <!-- traces -->
    <g stroke="#cffafe" stroke-opacity=".35" stroke-width="2" fill="none">
      <path d="M86 140 H280 V200 H320"/>
      <path d="M710 210 H640 V210 H625"/>
      <path d="M490 200 H515"/>
      <path d="M405 265 V320 H650"/>
    </g>
  </g>

  <!-- callouts -->
  <g font-family="Arial" fill="#e9edf7">
    <circle cx="120" cy="565" r="7" fill="#22d3ee" filter="url(#glow)"/>
    <text x="140" y="572" font-size="20">Receives wireless packets from DP &amp; vibration nodes</text>
    <circle cx="560" cy="565" r="7" fill="#7c3aed" filter="url(#glow)"/>
    <text x="580" y="572" font-size="20">Runs feature extraction + pre-stall AI confirmation</text>
  </g>
</g>
</svg>