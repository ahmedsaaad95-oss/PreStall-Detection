<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
<defs>
<linearGradient id="bg2" x1="0" x2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#091b2f"/></linearGradient>
<linearGradient id="met" x1="0" x2="1"><stop offset="0" stop-color="#d1d5db"/><stop offset="1" stop-color="#9ca3af"/></linearGradient>
<linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
</defs>
<rect width="1200" height="700" fill="url(#bg2)"/>
<g transform="translate(70,55)">
  <rect x="0" y="0" width="1060" height="590" rx="26" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)"/>
  <text x="36" y="56" fill="#e9edf7" font-size="34" font-family="Arial, sans-serif" font-weight="700">Sensors Package (DP + Vibration)</text>
  <text x="36" y="92" fill="#aeb7d6" font-size="22" font-family="Arial, sans-serif">Illustrative placement references for the pre-stall detection concept</text>

  <!-- DP transmitter -->
  <g transform="translate(80,180)">
    <text x="0" y="-20" fill="#e9edf7" font-size="24" font-family="Arial" font-weight="700">DP Transmitter (4–20 mA)</text>
    <rect x="0" y="0" width="420" height="250" rx="18" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.12)"/>
    <g transform="translate(70,85)">
      <rect x="0" y="40" width="200" height="50" rx="20" fill="url(#met)"/>
      <rect x="-42" y="48" width="60" height="34" rx="8" fill="#bfc7d3"/>
      <rect x="190" y="46" width="48" height="38" rx="10" fill="#9ca3af"/>
      <path d="M238 65 C275 65 295 30 335 30" stroke="#111827" stroke-width="8" fill="none"/>
      <path d="M238 65 C280 65 300 65 340 65" stroke="#ef4444" stroke-width="5" fill="none"/>
      <path d="M238 65 C280 65 300 98 340 98" stroke="#facc15" stroke-width="5" fill="none"/>
      <path d="M238 65 C280 65 300 130 340 130" stroke="#22d3ee" stroke-width="5" fill="none"/>
      <text x="345" y="33" fill="#e9edf7" font-size="15" font-family="Arial">Signal</text>
      <text x="345" y="70" fill="#e9edf7" font-size="15" font-family="Arial">V+</text>
      <text x="345" y="103" fill="#e9edf7" font-size="15" font-family="Arial">GND</text>
    </g>
  </g>

  <!-- Vibration sensor -->
  <g transform="translate(560,180)">
    <text x="0" y="-20" fill="#e9edf7" font-size="24" font-family="Arial" font-weight="700">Vibration Sensor (Surface / Frame)</text>
    <rect x="0" y="0" width="420" height="250" rx="18" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.12)"/>
    <rect x="85" y="80" width="170" height="100" rx="14" fill="#111827" stroke="rgba(255,255,255,0.18)"/>
    <circle cx="170" cy="130" r="22" fill="#374151" stroke="#9ca3af"/>
    <rect x="255" y="112" width="60" height="36" rx="8" fill="#1f2937" stroke="rgba(255,255,255,0.15)"/>
    <path d="M45 195 H375" stroke="#64748b" stroke-width="8"/>
    <path d="M72 195 C95 160 120 230 145 195 C170 160 195 230 220 195 C245 160 270 230 295 195" stroke="url(#purple)" stroke-width="4" fill="none"/>
    <text x="88" y="62" fill="#aeb7d6" font-size="16" font-family="Arial">MEMS / piezo accelerometer module (illustrative)</text>
  </g>

  <g font-family="Arial" font-size="20" fill="#e9edf7">
    <circle cx="80" cy="495" r="7" fill="#22d3ee"/><text x="100" y="502">DP trend (absolute + rate-of-change + ripple) feeds pre-stall logic</text>
    <circle cx="80" cy="535" r="7" fill="#7c3aed"/><text x="100" y="542">Vibration RMS / band energy confirms early mechanical load instability</text>
  </g>
</g>
</svg>